<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Warna</title>
    <style>
        body {
            font-family: Brush Script MT, cursive;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f0f0;
        }

        .kotak {
            width: 200px;
            height: 200px;
            background-color: blue;
            margin: 30px auto;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
            line-height: 200px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgb(0, 0, 0);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Kotak Warna</h1>
    <p>Klik kotak atau tombol di bawah ya!</p>

    <!-- Kotak yang akan berubah warna -->
    <div class="kotak" id="kotakWarna">Klik disini!</div>

    <!-- Tombol untuk mengubah warna secara acak -->
    <button id="btnUbah">Ubah Warna Acak</button>

    <!-- Tombol reset ke warna biru -->
    <button id="btnReset">Reset ke Biru</button>

    <p id="infoWarna">Warna saat ini: <strong>biru</strong></p>

    <script>
        // Ambil elemen dari DOM
        const kotak = document.getElementById("kotakWarna");
        const btnUbah = document.getElementById("btnUbah");
        const btnReset = document.getElementById("btnReset");
        const infoWarna = document.getElementById("infoWarna");

        // Fungsi untuk mengubah warna kotak
        function ubahWarna(warna, namaWarna) {
            kotak.style.backgroundColor = warna;
            infoWarna.innerHTML = `Warna saat ini: <strong>${namaWarna}</strong>`;
        }

        // Fungsi menghasilkan warna acak (format RGB)
        function warnaAcak() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return {
                rgb: `rgb(${r}, ${g}, ${b})`,
                nama: `rgb(${r}, ${g}, ${b})`
            };
        }

        // EVENT 1: Klik pada kotak (mengubah ke warna acak)
        kotak.addEventListener("click", function() {
            const warnaBaru = warnaAcak();
            ubahWarna(warnaBaru.rgb, warnaBaru.nama);
        });

        // EVENT 2: Klik tombol "Ubah Warna Acak"
        btnUbah.addEventListener("click", function() {
            const warnaBaru = warnaAcak();
            ubahWarna(warnaBaru.rgb, warnaBaru.nama);
        });

        // EVENT 3: Klik tombol "Reset ke Biru"
        btnReset.addEventListener("click", function() {
            ubahWarna("blue", "biru");
        });

        // BONUS: Event mouseover (ketika mouse masuk ke kotak)
        kotak.addEventListener("mouseenter", function() {
            kotak.style.transform = "scale(1.05)";
        });

        kotak.addEventListener("mouseleave", function() {
            kotak.style.transform = "scale(1)";
        });
    </script>
</body>
</html>
